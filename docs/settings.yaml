# Project agent settings — keep this file small.
# Agents re-read it at the start of every task.
#
# Only set what you need to change. Everything else uses fixed defaults in
# `.agents/AGENT_POLICY.md` (decisions, visuals, report style, code comments).

# Reply + artifact **prose** language. Headings / template keys / enums stay English.
#   en | vi
# One language per artifact — do not mix Vietnamese and English body text.
language: en

project:
  reference: .agents/PRJ_REFERENCE.md

rules:
  # Branching before any code change (IMPORTANT).
  #   direct    — work/commit on base/main
  #   checkout  — create/checkout a work branch first (safer default)
  branch:
    mode: checkout
    base: ""       # empty = detect (e.g. main)
    naming: ""     # e.g. feat/<slug>

  # Lifecycle report files: markdown (default) | html
  reports:
    output_format: markdown

  # Project wiki (`docs` skill). Set enabled: false to skip.
  docs:
    enabled: true
    location: .agents/wiki
    format: markdown          # markdown | html | docx | xlsx
    sync_strategy: with-commit  # with-commit | main-only

  # Optional — fill when the repo has a convention (init can merge these):
  # commit:
  #   convention: ""
  #   format: ""
  # pull_request:
  #   title_format: ""
  #   description_sections: []
  #   required_checks: []
