display_name: "Planning"
short_description: "MUST write slim PLAN.md + TASKS.md on disk. No full task cards in PLAN. Micro-tasks from design; implement before tests."
default_prompt: "Use $planning: write slim PLAN.md (task_index only) AND full TASKS.md in the session folder. Reject PLAN-only or tasks-inside-PLAN."
required_input: "DETAIL_DESIGN.md when present; else BASIC_DESIGN.md / DISCUSSION.md / requirement notes; user request; codebase mapping; affected systems; constraints."
required_output: "MUST write two session files on disk: PLAN.md (strategy + task_index only) and TASKS.md (full micro-task cards). Incomplete if only PLAN.md, only chat, or full task bodies embedded in PLAN.md."
note_important: "Do NOT implement code during planning. Do NOT finish without BOTH PLAN.md and TASKS.md on disk. Do NOT put ### T-00x bodies / AC / Verify / Files inside PLAN.md. Do NOT make the first task a test-case document or 6-dimension coverage matrix before feature code. Do NOT emit epic-level tasks when design detail exists. Do NOT invent affected files without inspecting the codebase. Do NOT treat assumptions as confirmed. Do NOT skip rollback for destructive changes. Do NOT re-design architecture when design artifacts already exist."
artifacts:
  PLAN.md:
    required: true
    schema:
      goal:
        type: string
        required: true
        description: "One sentence."
      scope:
        type: string
        required: true
        description: "In scope summary."
      non_goals:
        type: array
        required: false
        description: "Explicitly excluded outcomes."
      assumptions:
        type: array
        required: true
        description: "Assumptions with risk and confirmation status."
      approach:
        type: string
        required: true
        description: "Phased strategy only. No per-task AC/Verify/Files."
      affected_areas:
        type: array
        required: false
        description: "Systems/dirs at high level with confidence (known / inferred / unknown)."
      test_strategy:
        type: string
        required: false
        description: "How to verify after code exists. Not write-tests-first."
      verification_strategy:
        type: string
        required: true
        description: "Automated and manual verification for the whole change."
      definition_of_done:
        type: array
        required: true
        description: "Falsifiable completion checklist."
      rollback_strategy:
        type: string
        required: true
        description: "Undo strategy per code/config/data."
      risks:
        type: array
        required: false
        description: "Risks with impact and mitigation."
      task_index:
        type: array
        required: true
        description: "Ordered ID + short title only (implement before tests). No full cards."
      handoff:
        type: string
        required: true
        description: "Ready for sync/execution? Blocking items?"
  TASKS.md:
    required: true
    schema:
      plan_ref:
        type: string
        required: true
        description: "PLAN.md in the same session folder."
      tasks:
        type: array
        required: true
        description: "Micro-task cards: ID, title, Trace, Description, Depends, AC, Verify, Files/scope, confidence, status. Not epics."
      execution_order:
        type: array
        required: true
        description: "Ordered IDs. Feature implementation before automated tests."
      notes:
        type: array
        required: false
        description: "Sequencing notes or blockers."
