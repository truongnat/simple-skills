display_name: "Review PR"
short_description: "Review pull requests, merge requests, or branch diffs as a responsible code reviewer. Quality gate before merge."
default_prompt: "Use $review-pr to review a PR/MR or branch diff as a quality-responsible reviewer before merge."
required_input: "PR diff, branch diff, base/head, PR description, changed files, test/CI results, codebase context."
required_output: "REVIEW_PR.md with scope, findings, testing gaps, residual risks, PR description coverage, merge recommendation."
note_important: "Do NOT auto-fix the PR if the user only requested review. Do NOT approve on behalf of the user. Do NOT create findings without evidence. Do NOT claim merge-safe if verification is missing. Do NOT ignore security/data risks."
artifacts:
  REVIEW_PR.md:
    required: true
    schema:
      base:
        type: string
        required: true
        description: "Base branch or commit."
      head:
        type: string
        required: true
        description: "Head branch or commit."
      pr_description_accuracy:
        type: string
        required: true
        description: "Does the diff match the description? yes/partial/no."
      changed_areas:
        type: array
        required: true
        description: "Area, files, risk level, notes."
      findings:
        type: array
        required: false
        description: "Finding ID, severity, category, location, evidence, impact, recommendation, confidence."
      verification_reviewed:
        type: array
        required: true
        description: "Check, result (pass/fail/skipped/missing), evidence, concern."
      testing_gaps:
        type: array
        required: false
        description: "Gap, risk, suggested follow-up."
      residual_risks:
        type: array
        required: false
        description: "Risk, impact, acceptance/mitigation."
      merge_recommendation:
        type: string
        required: true
        description: "Approve / Approve with comments / Request changes / Needs more info / Needs more verification / Blocked."
